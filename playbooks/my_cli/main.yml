- name: Setup the CLI just the way I like it
  hosts: localhost
  become: false
  pre_tasks:
    - name: update apt cache
      become: true
      apt:
        update_cache: true
        cache_valid_time: 3600
  tasks:
    - import_tasks: tasks/fonts.yml
